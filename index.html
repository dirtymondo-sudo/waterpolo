<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Water Polo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05121f;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #eaf6ff;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      .hint {
        position: absolute;
        left: 16px;
        bottom: 14px;
        font-size: 13px;
        line-height: 1.5;
        opacity: 0.85;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      .hint kbd {
        display: inline-block;
        min-width: 18px;
        padding: 1px 6px;
        margin: 0 1px;
        text-align: center;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
      }
      #title {
        position: absolute;
        left: 16px;
        top: 14px;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.5px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #title small {
        font-weight: 400;
        opacity: 0.6;
      }
      #stats {
        position: absolute;
        right: 16px;
        top: 14px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
        text-align: right;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #scoreboard {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: rgba(5, 18, 31, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #scoreboard .team {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        opacity: 0.85;
      }
      #scoreboard .team.home { color: #6da0ff; }
      #scoreboard .team.away { color: #ff8a6e; }
      #scoreboard .score {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 1px;
      }
      #scoreboard .shotclock {
        min-width: 30px;
        margin-left: 6px;
        padding-left: 12px;
        border-left: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 18px;
        font-weight: 700;
        color: #ffe45e;
        text-align: center;
      }
      #scoreboard .shotclock.urgent { color: #ff5a5a; }
      #goalflash {
        position: absolute;
        top: 32%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1);
        font-size: 84px;
        font-weight: 900;
        letter-spacing: 4px;
        color: #ffe45e;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #goalflash.show { opacity: 1; }
      #chargebar {
        position: absolute;
        bottom: 54px;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        height: 12px;
        border-radius: 7px;
        background: rgba(5, 18, 31, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.1s ease;
      }
      #chargebar.show { opacity: 1; }
      #chargefill {
        height: 100%;
        width: 0%;
        background: #ffffff;
        transition: width 0.04s linear;
      }
      #chargelabel {
        position: absolute;
        right: 8px;
        top: -20px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="title">WATER POLO <small>— prototype</small></div>
      <div id="stats"></div>
      <div id="scoreboard">
        <span class="team home">P1</span>
        <span class="score" id="score">0 : 0</span>
        <span class="team away">CPU</span>
        <span class="shotclock" id="shotclock">30</span>
      </div>
      <div id="goalflash">GOAL!</div>
      <div id="chargebar"><div id="chargefill"></div><span id="chargelabel"></span></div>
      <div class="hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> — swim
        &nbsp;·&nbsp; <kbd>Shift</kbd> sprint
        &nbsp;·&nbsp; <kbd>Space</kbd> shoot <kbd>E</kbd> skip <kbd>Q</kbd> lob <small>(hold)</small>
        &nbsp;·&nbsp; <kbd>F</kbd> pass
        &nbsp;·&nbsp; <kbd>C</kbd> camera
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
